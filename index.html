<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Wall</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --panel-bg: #141414;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --text-dim: #888;
      --accent: #3b82f6;
      --muted-color: #ef4444;
      --unmuted-color: #22c55e;
      --toolbar-bg: #111111;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Toolbar */
    #toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 44px;
      padding: 0 16px;
      background: var(--toolbar-bg);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    #toolbar h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--text);
    }

    .toolbar-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-bg);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover { background: #1e1e1e; border-color: #444; }
    .btn.active { border-color: var(--accent); background: rgba(59,130,246,0.12); }

    .btn svg { width: 16px; height: 16px; fill: currentColor; }

    .layout-btn {
      width: 34px;
      height: 34px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .divider {
      width: 1px;
      height: 24px;
      background: var(--border);
      margin: 0 4px;
    }

    /* Grid */
    #grid {
      display: grid;
      height: calc(100vh - 44px);
      gap: 2px;
      background: var(--bg);
    }

    .grid-2x2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .grid-2x3 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .grid-3x3 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
    .grid-1plus { grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; }
    .grid-1plus .panel:first-child { grid-row: 1 / -1; }

    /* Panel */
    .panel {
      position: relative;
      background: var(--panel-bg);
      overflow: hidden;
    }

    .panel iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Panel overlay label + mute button */
    .panel-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .panel:hover .panel-label { opacity: 1; pointer-events: auto; }

    .panel-label .label-name {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .mute-btn {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .mute-btn svg { width: 16px; height: 16px; fill: white; }

    .mute-btn.muted { background: var(--muted-color); }
    .mute-btn.unmuted { background: var(--unmuted-color); }
  </style>
</head>
<body>

  <div id="toolbar">
    <h1>NEWS WALL</h1>
    <div class="toolbar-controls">
      <button class="btn layout-btn" data-layout="2x2" title="2x2 Grid">
        <svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
      </button>
      <button class="btn layout-btn" data-layout="2x3" title="2x3 Grid">
        <svg viewBox="0 0 16 16"><rect x="0.5" y="1" width="4.3" height="6" rx="0.5"/><rect x="5.8" y="1" width="4.3" height="6" rx="0.5"/><rect x="11.2" y="1" width="4.3" height="6" rx="0.5"/><rect x="0.5" y="9" width="4.3" height="6" rx="0.5"/><rect x="5.8" y="9" width="4.3" height="6" rx="0.5"/><rect x="11.2" y="9" width="4.3" height="6" rx="0.5"/></svg>
      </button>
      <button class="btn layout-btn" data-layout="3x3" title="3x3 Grid">
        <svg viewBox="0 0 16 16"><rect x="0.5" y="0.5" width="4" height="4" rx="0.5"/><rect x="6" y="0.5" width="4" height="4" rx="0.5"/><rect x="11.5" y="0.5" width="4" height="4" rx="0.5"/><rect x="0.5" y="6" width="4" height="4" rx="0.5"/><rect x="6" y="6" width="4" height="4" rx="0.5"/><rect x="11.5" y="6" width="4" height="4" rx="0.5"/><rect x="0.5" y="11.5" width="4" height="4" rx="0.5"/><rect x="6" y="11.5" width="4" height="4" rx="0.5"/><rect x="11.5" y="11.5" width="4" height="4" rx="0.5"/></svg>
      </button>
      <button class="btn layout-btn" data-layout="1plus" title="1 Large + Side">
        <svg viewBox="0 0 16 16"><rect x="1" y="1" width="8" height="14" rx="1"/><rect x="11" y="1" width="4" height="6" rx="1"/><rect x="11" y="9" width="4" height="6" rx="1"/></svg>
      </button>

      <div class="divider"></div>

      <button class="btn" id="mute-all-btn" onclick="muteAll()">
        <svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
        Mute All
      </button>
      <button class="btn" id="unmute-all-btn" onclick="unmuteAll()">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        Unmute All
      </button>
    </div>
  </div>

  <div id="grid" class="grid-2x3"></div>

  <script>
    // News sources using YouTube channel IDs for live stream auto-resolution
    // The /live URL automatically finds the current live broadcast for each channel
    const NEWS_SOURCES = [
      { name: "ABC News",    channelId: "UCBi2mrWuNuyYy4gbM6fU18Q" },
      { name: "NBC News",    channelId: "UCeY0bbntWzzVIaj2z3QigXg" },
      { name: "CBS News",    channelId: "UC8p1vwvWtl6T73JiExfWs1g" },
      { name: "Fox News",    channelId: "UCXIJgqnII2ZOINSWNOGFThA" },
      { name: "Bloomberg",   channelId: "UCIALMKvObZNtJ6AmdCLP7Lg" },
      { name: "Sky News",    channelId: "UCoMdktPbSTixAyNGwb-UYkQ" },
      { name: "Al Jazeera",  channelId: "UCNye-wNBqNL5ZzHSJj3l8Bg" },
      { name: "France 24",   channelId: "UCQfwfsi5VrQ8yKZ-UWmAEFg" },
      { name: "DW News",     channelId: "UCknLrEdhRCp1aegoMqRaCZg" },
    ];

    // State
    let currentLayout = "2x3";
    let muteStates = {};   // index -> boolean (true = muted)
    let players = {};      // index -> YT.Player

    // Load YouTube IFrame API
    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    let ytReady = false;
    let ytReadyQueue = [];

    window.onYouTubeIframeAPIReady = function () {
      ytReady = true;
      ytReadyQueue.forEach(cb => cb());
      ytReadyQueue = [];
    };

    function whenYTReady(cb) {
      if (ytReady) cb();
      else ytReadyQueue.push(cb);
    }

    const LAYOUT_COUNTS = { "2x2": 4, "2x3": 6, "3x3": 9, "1plus": 3 };

    function buildGrid() {
      const grid = document.getElementById("grid");
      grid.className = `grid-${currentLayout}`;
      grid.innerHTML = "";

      // Destroy existing players
      Object.values(players).forEach(p => { try { p.destroy(); } catch(e) {} });
      players = {};

      const count = LAYOUT_COUNTS[currentLayout] || 6;
      const sources = NEWS_SOURCES.slice(0, count);

      sources.forEach((source, i) => {
        if (muteStates[i] === undefined) muteStates[i] = true;

        const panel = document.createElement("div");
        panel.className = "panel";
        panel.dataset.index = i;

        // Use an iframe that loads the channel's live page
        // YouTube's /embed/live_stream?channel= auto-resolves to current live
        const iframe = document.createElement("iframe");
        iframe.id = `iframe-${i}`;
        iframe.allow = "autoplay; encrypted-media";
        iframe.setAttribute("allowfullscreen", "");
        iframe.src = `https://www.youtube.com/embed/live_stream?channel=${source.channelId}&autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&playsinline=1&enablejsapi=1`;

        const label = document.createElement("div");
        label.className = "panel-label";
        label.innerHTML = `
          <span class="label-name">${source.name}</span>
          <button class="mute-btn muted" data-index="${i}" onclick="toggleMute(${i}, this)" title="Unmute">
            ${muteOffSVG()}
          </button>
        `;

        panel.appendChild(iframe);
        panel.appendChild(label);
        grid.appendChild(panel);

        // Also create a YT.Player wrapper on the iframe for mute control
        whenYTReady(() => {
          try {
            players[i] = new YT.Player(`iframe-${i}`, {
              events: {
                onReady: function(event) {
                  event.target.mute();
                  event.target.playVideo();
                }
              }
            });
          } catch(e) {
            // Fallback: player wrapping may fail, mute controls will reload iframe
          }
        });
      });
    }

    // Toggle mute for a single panel
    function toggleMute(index, btnEl) {
      const player = players[index];
      const isMuted = muteStates[index];

      if (player && typeof player.isMuted === "function") {
        // Use YT API
        if (isMuted) {
          player.unMute();
          muteStates[index] = false;
        } else {
          player.mute();
          muteStates[index] = true;
        }
      } else {
        // Fallback: reload iframe with toggled mute param
        const source = NEWS_SOURCES[index];
        const iframe = document.getElementById(`iframe-${index}`);
        const newMute = isMuted ? 0 : 1;
        muteStates[index] = !isMuted;
        iframe.src = `https://www.youtube.com/embed/live_stream?channel=${source.channelId}&autoplay=1&mute=${newMute}&controls=0&modestbranding=1&rel=0&playsinline=1&enablejsapi=1`;
      }

      updateMuteButton(btnEl, muteStates[index]);
    }

    function muteAll() {
      const count = LAYOUT_COUNTS[currentLayout] || 6;
      for (let i = 0; i < count; i++) {
        const player = players[i];
        if (player && typeof player.mute === "function") {
          player.mute();
        } else {
          // Fallback: reload iframe muted
          const source = NEWS_SOURCES[i];
          const iframe = document.getElementById(`iframe-${i}`);
          if (iframe && source) {
            iframe.src = `https://www.youtube.com/embed/live_stream?channel=${source.channelId}&autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&playsinline=1&enablejsapi=1`;
          }
        }
        muteStates[i] = true;
      }
      updateAllMuteButtons();
    }

    function unmuteAll() {
      const count = LAYOUT_COUNTS[currentLayout] || 6;
      for (let i = 0; i < count; i++) {
        const player = players[i];
        if (player && typeof player.unMute === "function") {
          player.unMute();
        } else {
          const source = NEWS_SOURCES[i];
          const iframe = document.getElementById(`iframe-${i}`);
          if (iframe && source) {
            iframe.src = `https://www.youtube.com/embed/live_stream?channel=${source.channelId}&autoplay=1&mute=0&controls=0&modestbranding=1&rel=0&playsinline=1&enablejsapi=1`;
          }
        }
        muteStates[i] = false;
      }
      updateAllMuteButtons();
    }

    function updateMuteButton(btn, muted) {
      btn.className = `mute-btn ${muted ? 'muted' : 'unmuted'}`;
      btn.title = muted ? "Unmute" : "Mute";
      btn.innerHTML = muted ? muteOffSVG() : muteOnSVG();
    }

    function updateAllMuteButtons() {
      document.querySelectorAll(".mute-btn").forEach(btn => {
        const idx = parseInt(btn.dataset.index);
        updateMuteButton(btn, muteStates[idx]);
      });
    }

    // SVG icons
    function muteOnSVG() {
      return '<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>';
    }

    function muteOffSVG() {
      return '<svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>';
    }

    // Layout switching
    document.querySelectorAll(".layout-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".layout-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentLayout = btn.dataset.layout;
        buildGrid();
      });
    });

    // Set default active
    document.querySelector('[data-layout="2x3"]').classList.add("active");

    // Keyboard shortcuts: M = mute all, U = unmute all
    document.addEventListener("keydown", (e) => {
      if (e.key === "m" || e.key === "M") muteAll();
      if (e.key === "u" || e.key === "U") unmuteAll();
    });

    // Init
    buildGrid();
  </script>
</body>
</html>
